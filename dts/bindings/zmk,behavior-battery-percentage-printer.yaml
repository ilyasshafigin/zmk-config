# SPDX-License-Identifier: MIT

description: "Behavior that types the battery percentage."

compatible: "zmk,behavior-battery-percentage-printer"

include: zero_param.yaml

properties:
  digit-keycodes:
    type: array
    required: false
    description: Keycodes used for digits 0 through 9 when typing battery percentage.
  space-keycode:
    type: int
    required: false
    description: Keycode used for the space character.
  dot-keycode:
    type: int
    required: false
    description: Keycode used for the dot character.
  percent-keycode:
    type: int
    required: false
    description: Keycode used for the percent character.
